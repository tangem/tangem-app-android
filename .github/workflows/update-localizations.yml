name: Test versions setting

on:
  push:
    branches:
      - 'feature/AND-10052_store_tasks_in_aws'
  workflow_dispatch:
    inputs:
      build_description:
        description: >
          Optional additional info about the build
        type: string
  workflow_call:
    secrets:
      FIREBASE_APP_ID_INTERNAL:
        required: true
      FIREBASE_CLI_TOKEN:
        required: true
      # Token must have read access to all the submodule repositories
      GH_MOBILE_PAT:
        required: true
jobs:
  generate-release-name:
    runs-on: ubuntu-latest
#    strategy:
#      matrix:
#        branch_name: ["releases/5.21", "hotfix/5.21.1", "develop", "test", "feature/AND-123", "feature/releases/5.21", "releases/XXX"]
#    outputs:
#      versionName: ${{ steps.get_version_name.outputs.versionName }}
    steps:
      - name: Checkout 'find-latest-release-branch' script
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            ci_resources/find-latest-release-branch.sh
          sparse-checkout-cone-mode: false

      - name: Find latest release branch
        id: find_latest_release
        run: |
          echo "🔍 Fetching all remote branches..."
          
          # Retrieve all remote branches without cloning the repository
          BRANCHES=$(git ls-remote --heads https://github.com/${{ github.repository }}.git)
          
          echo "✅ Retrieved branches from the remote repository:"
          echo "$BRANCHES"
          
          echo "🔍 Extracting full branch names..."
          # Extract branch names while preserving the full path (e.g., "refs/heads/releases/1.0")
          BRANCH_NAMES=$(echo "$BRANCHES" | sed 's?.*refs/heads/??')
          
          echo "✅ Extracted branch names:"
          echo "$BRANCH_NAMES"
          
          echo "🔍 Filtering only release branches..."
          # Select only release branches (format: releases/X.Y or releases/X.Y.Z)
          RELEASE_BRANCHES=$(echo "$BRANCH_NAMES" | grep -E '^test/[0-9]+\.[0-9]+(\.[0-9]+)?$' || true)
          
          if [[ -z "$RELEASE_BRANCHES" ]]; then
            echo "⚠️ No release branches found. Exiting."
            exit 0
          fi
          
          echo "✅ Found release branches:"
          echo "$RELEASE_BRANCHES"
          
          echo "🔍 Sorting release branches lexicographically..."
          # Sort branches lexicographically to get the latest version
          LATEST_RELEASE=$(echo "$RELEASE_BRANCHES" | sort -V | tail -n 1)
          
          echo "✅ Latest release branch found: $LATEST_RELEASE"
          echo "Current branch:  ${{ github.ref_name }}"
          
          # Save the result to GitHub output
          echo "latest_release_branch=$LATEST_RELEASE" >> $GITHUB_OUTPUT
        

