name: Test versions setting

on:
  push:
    branches:
      - 'feature/AND-10052_store_tasks_in_aws'
  workflow_dispatch:
    inputs:
      build_description:
        description: >
          Optional additional info about the build
        type: string
  workflow_call:
    secrets:
      FIREBASE_APP_ID_INTERNAL:
        required: true
      FIREBASE_CLI_TOKEN:
        required: true
      # Token must have read access to all the submodule repositories
      GH_MOBILE_PAT:
        required: true
jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug Token
        run: |
          echo "Token length: $(echo -n "${{ secrets.TEST_CLONE_REPO_KEY }}" | wc -c)"

      - name: Push to mirror
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Настроить SSH-ключ
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_CLONE_REPO_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          
          # Добавить GitHub в known_hosts, чтобы избежать предупреждений
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # Проверить удалённые репозитории
          git remote -v
          
          # Добавить mirror, если его нет
          git remote remove mirror || true
          git remote add mirror git@github.com:tangem-developments/tangem-app-android-clone-test.git
          
          # Выполнить push
          echo "push"
          git push --mirror mirror
