name: Android CI/CD Internal
on:
  push:
    branches:
      - 'develop'
      - 'feature/AND-7341_publishing_internal_builds'
  workflow_dispatch:
  workflow_call:
    secrets:
      FIREBASE_APP_ID:
        required: true
      FIREBASE_CLI_TOKEN:
        required: true
      # Token must have read access to all the submodule repositories
      GH_MOBILE_PAT:
        required: true

env:
  INITIAL_VERSION_CODE: ${{ 1000 }}

jobs:
  build:
    name: Upload apk to App Tester
    runs-on: [self-hosted, old]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          token: ${{ secrets.GH_MOBILE_PAT }}
      - name: set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '17'
      - name: Increment version code
        env:
          NUM: ${{ github.run_number }}
        run: |
          echo "VERSION_CODE=$(($NUM + $INITIAL_VERSION_CODE))" >> $GITHUB_ENV
      - name: Copy GoogleServices JSON
        run: |
          cp "app/src/main/assets/tangem-app-config/android/google-services.json" "app/"
      - name: Build internal artifact
        run: |
          echo sdk.dir = $ANDROID_HOME > local.properties
          GITHUB_ACTOR=${{ secrets.GITHUB_ACTOR }} GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ./gradlew assembleInternalQA -PversionCode=${{ env.VERSION_CODE }}
      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          token: ${{secrets.FIREBASE_CLI_TOKEN}}
          groups: qa-android
          file: build/outputs/app-internal.apk