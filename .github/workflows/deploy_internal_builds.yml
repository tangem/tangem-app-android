name: Android CI/CD Internal
on:
  push:
    branches:
      - 'develop'
      - 'feature/AND-7341_publishing_internal_builds'
  workflow_dispatch:
  workflow_call:
    secrets:
      FIREBASE_APP_ID:
        required: true
      FIREBASE_APP_ID_INTERNAL:
        required: true
      FIREBASE_CLI_TOKEN:
        required: true
      # Token must have read access to all the submodule repositories
      GH_MOBILE_PAT:
        required: true

env:
  INITIAL_VERSION_CODE: ${{ 1000 }}

jobs:
  build:
    name: Upload apk to Firebase
    runs-on: [self-hosted, old]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          token: ${{ secrets.GH_MOBILE_PAT }}
      - name: set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '17'
      - name: Increment version code
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "VERSION_CODE=$((RUN_NUMBER + $INITIAL_VERSION_CODE))" >> $GITHUB_ENV
#      - name: Copy GoogleServices JSON
#        run: |
#          cp "app/src/main/assets/tangem-app-config/android/google-services.json" "app/"
      - name: Read version.properties file
        uses: BrycensRanch/read-properties-action@v1
        id: version
        with:
          file: version.properties
          property: versionName
          default: 0.0.1
      - name: Echo version.properties
        run: echo ${{ steps.version.outputs.versionName }} ${{ VERSION_CODE }}
#      - name: Build internal artifact
#        run: |
#          echo sdk.dir = $ANDROID_HOME > local.properties
#          GITHUB_ACTOR=${{ secrets.GITHUB_ACTOR }} GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ./gradlew assembleInternalQA -PversionCode=${{ env.VERSION_CODE }} -PversionName=${{ steps.version.outputs.versionName }}
      - name: Bundle install
        run: |
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3
#      - name: Upload artifact to Firebase App Distribution
#        run: |
#          FIREBASE_TOKEN=${{secrets.FIREBASE_CLI_TOKEN}} firebase appdistribution:distribute \
#          "build/outputs/app-internal.apk" \
#          --app ${{secrets.FIREBASE_APP_ID_INTERNAL}} \
#          --groups "qa-android" \
#          --release-notes "Bug fixes and improvements"
